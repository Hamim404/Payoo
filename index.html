<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo- Login Page</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="./payoo.png" type="image/x-icon" />
    <!-- daisyUI and tailwind cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-[#f4f5f7] flex flex-col justify-center items-center h-screen">
    <div class="bg-[url(/assets/bg.png)] w-96 bg-no-repeat bg-cover bg-top">
      <img src="assets/group.png" alt="" class="mx-auto mt-10 mb-5" />
    </div>

    <form
      action="#"
      class="bg-white w-96 p-10 flex flex-col justify-center items-start"
    >
      <label class="label font-bold mb-1">Mobile Number</label>
      <input
        type="email"
        class="input rounded-3xl border-none bg-base-200 mb-2"
        id="mobile-number"
        placeholder="Enter your number"
      />
      <label class="label font-bold mb-">4 Digit Pin</label>
      <input
        type="password"
        class="input rounded-3xl border-none bg-base-200 mb-2"
        id="pin-number"
        placeholder="Enter 4 Digit Pin"
      />
      <input
        type="submit"
        class="btn btn-neutral mt-4 rounded-3xl w-full bg-[#0874F2] border-none"
        id="login-btn"
        value="Login"
      />
    </form>

    <!-- js linked -->
    <script src="script.js"></script>
  </body>
</html>
