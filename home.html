<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo - Home Page</title>
    <!-- daisyUI and tailwind cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome -->
    <script
      src="https://kit.fontawesome.com/14d25571fc.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body class="bg-[#F4F5F7]">
    <!-- Navbar -->
    <div class="navbar shadow-sm">
      <div class="flex w-2/4 justify-between mx-auto">
        <div class="logo flex">
          <a class="btn btn-ghost text-xl"
            ><img src="./assets/group.png" alt="" class="w-12"
          /></a>
          <div class="logo-content">
            <h4 class="font-bold">$<span id="main-balance">45000</span></h4>
            <p class="text-sm text-gray-600">Available Balance</p>
          </div>
        </div>
        <button class="btn">
          <i class="fa-solid fa-right-from-bracket"></i>Log out
        </button>
      </div>
    </div>

    <!-- Hero -->
    <section id="hero" class="w-2/4 mx-auto mt-16 p-5 rounded-2xl bg-white">
      <h1 class="text-3xl font-bold mb-2">🔥 Welcome to Payooo!</h1>
      <p class="text-gray-600">
        Enjoy easy and convenient financial services with us.<br />Cashout
        charge is low and
      </p>
      <div class="grid grid-cols-3 grid-rows-2 gap-5 mt-10">
        <button
          class="border border-solid border-neutral-500 p-5 rounded-xl cursor-pointer hover:border-[#0874F2] hover:text-[#0874F2] hover:font-bold flex flex-col justify-center items-center"
          id="add-money-btn"
        >
          <img src="./assets/wallet1.png" alt="" />
          Add Money
        </button>
        <button
          class="border border-solid border-neutral-500 p-5 rounded-xl cursor-pointer hover:border-[#0874F2] hover:text-[#0874F2] hover:font-bold flex flex-col justify-center items-center"
          id="cashout-btn"
        >
          <img src="./assets/send1.png" alt="" />
          Cashout
        </button>
        <button
          class="border border-solid border-neutral-500 p-5 rounded-xl cursor-pointer hover:border-[#0874F2] hover:text-[#0874F2] hover:font-bold flex flex-col justify-center items-center"
          id="transfer-money-btn"
        >
          <img src="./assets/money1.png" alt="" />
          Transfer Money
        </button>
        <button
          class="border border-solid border-neutral-500 p-5 rounded-xl cursor-pointer hover:border-[#0874F2] hover:text-[#0874F2] hover:font-bold flex flex-col justify-center items-center"
          id="get-bonus-btn"
        >
          <img src="./assets/bonus1.png" alt="" />
          Get Bonus
        </button>
        <button
          class="border border-solid border-neutral-500 p-5 rounded-xl cursor-pointer hover:border-[#0874F2] hover:text-[#0874F2] hover:font-bold flex flex-col justify-center items-center"
          id="pay-bill-btn"
        >
          <img src="./assets/purse1.png" alt="" />
          Pay Bill
        </button>
        <button
          class="border border-solid border-neutral-500 p-5 rounded-xl cursor-pointer hover:border-[#0874F2] hover:text-[#0874F2] hover:font-bold flex flex-col justify-center items-center"
          id="transaction-btn"
        >
          <img src="./assets/transaction1.png" alt="" />
          Transactions
        </button>
      </div>
    </section>

    <!-- Add Money Section -->
    <section class="w-2/4 mx-auto p-5 hidden" id="add-money-section">
      <h2 class="text-xl font-bold">Add Money</h2>
      <form
        action=""
        class="bg-white p-5 mt-5 rounded-xl flex flex-col justify-center items-start gap-3"
      >
        <label class="text-lg">Select a Bank</label>
        <select
          class="select bg-[#F4F5F7] border-none outline-none rounded-xl w-full"
        >
          <option disabled selected>Select Bank</option>
          <option>Dutch Bangla Bank</option>
          <option>Islami Bank Bangladesh PLC.</option>
          <option>National Credit and Commerce Bank</option>
        </select>
        <label for="">Bank Account Number</label>
        <input
          type="text"
          placeholder="Enter 11 digit account number"
          class="input input-ghost bg-[#F4F5F7] border-none outline-none rounded-xl w-full"
          id="bank-number"
        />
        <label for="">Amount to Add</label>
        <input
          type="number"
          placeholder="Add amount to withdraw"
          class="input input-ghost bg-[#F4F5F7] border-none outline-none rounded-xl w-full"
          id="amount-number"
        />
        <label for="">Pin Number</label>
        <input
          type="text"
          placeholder="Enter 4 digit pin number"
          class="input input-ghost bg-[#F4F5F7] border-none outline-none rounded-xl w-full"
          id="pin-number"
        />
        <input
          type="submit"
          value="Add Money"
          class="bg-info font-bold text-white py-2 w-full rounded-xl cursor-pointer"
          id="add-btn"
        />
      </form>
    </section>

    <!-- Cashout Section -->
    <section class="w-2/4 mx-auto p-5 hidden" id="cashout-section">
      <h2 class="text-xl font-bold">Cashout</h2>
      <form
        action=""
        class="bg-white p-5 mt-5 rounded-xl flex flex-col justify-center items-start gap-3"
      >
        <label for="">Agent Number</label>
        <input
          type="text"
          placeholder="Enter 11 digit number"
          class="input input-ghost bg-[#F4F5F7] border-none outline-none rounded-xl w-full"
          id="agent-number"
        />
        <label for="">Amount</label>
        <input
          type="number"
          placeholder="Enter amount to withdraw"
          class="input input-ghost bg-[#F4F5F7] border-none outline-none rounded-xl w-full"
          id="withdraw-amount-number"
        />
        <label for="">Pin Number</label>
        <input
          type="text"
          placeholder="Enter 4 digit pin number"
          class="input input-ghost bg-[#F4F5F7] border-none outline-none rounded-xl w-full"
          id="withdraw-pin-number"
        />
        <input
          type="submit"
          value="Withdraw Money"
          class="bg-info font-bold text-white py-2 w-full rounded-xl cursor-pointer"
          id="withdraw-btn"
        />
      </form>
    </section>

    <!-- script link -->
    <script src="./home.js"></script>
  </body>
</html>
